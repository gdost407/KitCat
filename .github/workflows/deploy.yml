name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOST_FTP_SERVER }}
          username: ${{ secrets.HOST_FTP_USERNAME }}
          password: ${{ secrets.HOST_FTP_PASSWORD }}
          server-dir: /KitCat/

      - name: Verify FTP upload location
        env:
          FTP_SERVER: ${{ secrets.HOST_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.HOST_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.HOST_FTP_PASSWORD }}
        run: |
          set +e
          FTP_HOST="${FTP_SERVER#ftp://}"
          FTP_HOST="${FTP_HOST%/}"

          for path in "/" "/KitCat/" "/kitCat/" "/public_html/" "/public_html/KitCat/" "/public_html/kitCat/"; do
            echo "---- Listing ftp://$FTP_HOST$path"
            curl --silent --show-error --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_HOST$path"
            echo
          done
